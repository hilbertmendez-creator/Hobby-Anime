name: hobby-anime

services:
  qbittorrent:
    image: ${QBITTORRENT_IMAGE:-ghcr.io/linuxserver/qbittorrent:latest}
    restart: unless-stopped
    environment:
      PUID: ${PUID:-1000}
      PGID: ${PGID:-1000}
      TZ: ${TZ:-UTC}
      WEBUI_PORT: 8080
      TORRENTING_PORT: 6881
    volumes:
      - ${QBITTORRENT_CONFIG_ROOT:-/volume1/docker/hobby-anime/qbittorrent}:/config
      - ${DATA_ROOT:-/volume1/data}/torrents:/data/torrents
    ports:
      - "${LAN_IP:-127.0.0.1}:${QBITTORRENT_WEB_PORT:-8080}:8080"
      - "${QBITTORRENT_PEER_PORT:-6881}:6881"
      - "${QBITTORRENT_PEER_PORT:-6881}:6881/udp"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/ >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - media

  jellyfin:
    image: ${JELLYFIN_IMAGE:-jellyfin/jellyfin:latest}
    restart: unless-stopped
    user: ${PUID:-1000}:${PGID:-1000}
    environment:
      TZ: ${TZ:-UTC}
    volumes:
      - ${JELLYFIN_CONFIG_ROOT:-/volume1/docker/hobby-anime/jellyfin/config}:/config
      - ${JELLYFIN_CACHE_ROOT:-/volume1/docker/hobby-anime/jellyfin/cache}:/cache
      - ${DATA_ROOT:-/volume1/data}/media:/media:ro
    ports:
      - "${LAN_IP:-127.0.0.1}:${JELLYFIN_WEB_PORT:-8096}:8096"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8096/health >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s
    networks:
      - media

  sonarr:
    image: ${SONARR_IMAGE:-lscr.io/linuxserver/sonarr:latest}
    restart: unless-stopped
    environment:
      PUID: ${PUID:-1000}
      PGID: ${PGID:-1000}
      TZ: ${TZ:-UTC}
    volumes:
      - ${SONARR_CONFIG_ROOT:-/volume1/docker/hobby-anime/sonarr}:/config
      - ${DATA_ROOT:-/volume1/data}:/data
    ports:
      - "${LAN_IP:-127.0.0.1}:${SONARR_WEB_PORT:-8989}:8989"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8989/ping >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s
    depends_on:
      qbittorrent:
        condition: service_healthy
    networks:
      - media

  prowlarr:
    image: ${PROWLARR_IMAGE:-lscr.io/linuxserver/prowlarr:latest}
    restart: unless-stopped
    environment:
      PUID: ${PUID:-1000}
      PGID: ${PGID:-1000}
      TZ: ${TZ:-UTC}
    volumes:
      - ${PROWLARR_CONFIG_ROOT:-/volume1/docker/hobby-anime/prowlarr}:/config
    ports:
      - "${LAN_IP:-127.0.0.1}:${PROWLARR_WEB_PORT:-9696}:9696"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9696/ping >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s
    depends_on:
      sonarr:
        condition: service_healthy
    networks:
      - media

  bazarr:
    image: ${BAZARR_IMAGE:-lscr.io/linuxserver/bazarr:latest}
    restart: unless-stopped
    environment:
      PUID: ${PUID:-1000}
      PGID: ${PGID:-1000}
      TZ: ${TZ:-UTC}
    volumes:
      - ${BAZARR_CONFIG_ROOT:-/volume1/docker/hobby-anime/bazarr}:/config
      - ${DATA_ROOT:-/volume1/data}/media:/data/media
    ports:
      - "${LAN_IP:-127.0.0.1}:${BAZARR_WEB_PORT:-6767}:6767"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:6767/ >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s
    depends_on:
      sonarr:
        condition: service_healthy
    networks:
      - media

  hobby-anime:
    build:
      context: .
    restart: unless-stopped
    init: true
    user: ${PUID:-1000}:${PGID:-1000}
    env_file:
      - .env
    volumes:
      - ${AGENT_CONFIG_ROOT:-/volume1/docker/hobby-anime/agent}:/config
      - ${DATA_ROOT:-/volume1/data}/media:/data/media:ro
      - ${DATA_ROOT:-/volume1/data}/torrents:/data/torrents:ro
    healthcheck:
      test: ["CMD-SHELL", "hobby-anime status >/dev/null || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    mem_limit: ${AGENT_MEM_LIMIT:-1g}
    cpus: ${AGENT_CPUS:-1.0}
    depends_on:
      qbittorrent:
        condition: service_healthy
      jellyfin:
        condition: service_healthy
      sonarr:
        condition: service_healthy
    networks:
      - media

  ollama:
    image: ${OLLAMA_IMAGE:-ollama/ollama:0.32.1}
    profiles:
      - ai
    restart: unless-stopped
    volumes:
      - ${OLLAMA_CONFIG_ROOT:-/volume1/docker/hobby-anime/ollama}:/root/.ollama
    mem_limit: ${OLLAMA_MEM_LIMIT:-4g}
    cpus: ${OLLAMA_CPUS:-2.0}
    networks:
      - media

networks:
  media:
    driver: bridge
